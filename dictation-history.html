<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictation History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0a1628 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 26px;
            background: linear-gradient(90deg, #4a9eff, #6dd5ed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-bottom: 24px;
            font-size: 13px;
        }

        /* ── Room code bar ── */
        .room-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .room-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            outline: none;
        }
        .room-bar input:focus { border-color: #4a9eff; }
        .room-bar button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #4a9eff, #357abd);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .room-bar button:hover { opacity: 0.9; }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(74,158,255,0.3);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
            border: none;
        }
        .tab.active {
            background: rgba(74,158,255,0.2);
            color: #4a9eff;
        }

        /* ── Search bar ── */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            outline: none;
        }
        .search-bar input:focus { border-color: #4a9eff; }
        .search-toggle {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(74,158,255,0.3);
        }
        .search-toggle button {
            padding: 10px 14px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .search-toggle button.active {
            background: rgba(74,158,255,0.25);
            color: #4a9eff;
        }
        .search-bar .go-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #4a9eff, #357abd);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        /* ── Date list ── */
        .date-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .date-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        .date-item:hover { background: rgba(74,158,255,0.12); border-color: rgba(74,158,255,0.3); }
        .date-item.active { background: rgba(74,158,255,0.18); border-color: rgba(74,158,255,0.5); }
        .date-label { font-weight: 600; font-size: 15px; }
        .date-count {
            background: rgba(74,158,255,0.2);
            color: #6dd5ed;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ── Back button ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.05);
            color: #4a9eff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
        }
        .back-btn:hover { background: rgba(74,158,255,0.1); }

        /* ── Dictation cards ── */
        .dictation-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.15s;
        }
        .dictation-card:hover { background: rgba(74,158,255,0.1); border-color: rgba(74,158,255,0.3); }
        .dictation-card.expanded { border-color: rgba(74,158,255,0.5); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-time {
            font-size: 13px;
            color: #6dd5ed;
            font-weight: 600;
        }
        .card-patient {
            font-size: 12px;
            background: rgba(74,158,255,0.15);
            color: #8bb8f0;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .card-patient.has-name {
            background: rgba(72, 199, 142, 0.2);
            color: #48c78e;
        }
        .card-preview {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-full-text {
            display: none;
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .dictation-card.expanded .card-preview { display: none; }
        .dictation-card.expanded .card-full-text { display: block; }

        .card-actions {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            gap: 8px;
        }
        .dictation-card.expanded .card-actions { display: flex; }
        .card-actions button {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            cursor: pointer;
        }
        .card-actions button:hover { background: rgba(255,255,255,0.1); }
        .card-actions button.delete-btn { border-color: rgba(255,80,80,0.3); color: #ff6b6b; }
        .card-actions button.delete-btn:hover { background: rgba(255,80,80,0.15); }

        /* ── Search highlight ── */
        mark {
            background: rgba(255, 214, 0, 0.35);
            color: white;
            border-radius: 2px;
            padding: 0 2px;
        }

        /* ── Empty / loading states ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.4);
        }
        .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-count {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }

        /* ── Patient name edit ── */
        .name-edit-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            align-items: center;
        }
        .name-edit-row input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 13px;
            outline: none;
        }
        .name-edit-row button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background: rgba(74,158,255,0.3);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Dictation History</h1>
    <p class="subtitle">Browse &amp; search saved dictations</p>

    <!-- Room code -->
    <div class="room-bar">
        <input type="text" id="roomInput" placeholder="Room code..." />
        <button onclick="connect()">Connect</button>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs" style="display:none;">
        <button class="tab active" onclick="switchTab('browse')">📅 Browse by Date</button>
        <button class="tab" onclick="switchTab('search')">🔍 Search All</button>
    </div>

    <!-- Browse panel -->
    <div id="browsePanel" style="display:none;">
        <div id="dateListView">
            <div id="dateList" class="date-list"></div>
        </div>
        <div id="dayView" style="display:none;">
            <button class="back-btn" onclick="backToDates()">← Back to dates</button>
            <h3 id="dayTitle" style="margin-bottom:14px; font-size:16px; color:rgba(255,255,255,0.8);"></h3>
            <div id="dayDictations"></div>
        </div>
    </div>

    <!-- Search panel -->
    <div id="searchPanel" style="display:none;">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search all dictations..." onkeydown="if(event.key==='Enter')doSearch()" />
            <div class="search-toggle">
                <button class="active" id="exactBtn" onclick="setMode('exact')">Exact</button>
                <button id="fuzzyBtn" onclick="setMode('fuzzy')">Fuzzy</button>
            </div>
            <button class="go-btn" onclick="doSearch()">Search</button>
        </div>
        <div id="searchResults"></div>
    </div>

    <div id="mainContent">
        <div class="empty-state">Enter your room code to view dictation history</div>
    </div>
</div>

<script>
const API = window.location.origin;
let room = '';
let searchMode = 'exact';
let currentTab = 'browse';
let expandedCardId = null;

// ── Connect ──
function connect() {
    room = document.getElementById('roomInput').value.trim();
    if (!room) return;
    localStorage.setItem('dh_room', room);
    document.getElementById('tabs').style.display = 'flex';
    document.getElementById('mainContent').innerHTML = '';
    switchTab('browse');
}

// Restore room from localStorage
(function() {
    const saved = localStorage.getItem('dh_room');
    if (saved) {
        document.getElementById('roomInput').value = saved;
    }
})();

// ── Tabs ──
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'browse') || (i === 1 && tab === 'search'));
    });
    document.getElementById('browsePanel').style.display = tab === 'browse' ? 'block' : 'none';
    document.getElementById('searchPanel').style.display = tab === 'search' ? 'block' : 'none';
    if (tab === 'browse') loadDates();
    if (tab === 'search') document.getElementById('searchInput').focus();
}

// ── Browse by date ──
async function loadDates() {
    const el = document.getElementById('dateList');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading dates...</div>';
    document.getElementById('dateListView').style.display = 'block';
    document.getElementById('dayView').style.display = 'none';

    try {
        const resp = await fetch(`${API}/api/dictations/${room}/dates`);
        const dates = await resp.json();
        if (!dates.length) {
            el.innerHTML = '<div class="empty-state">No dictations saved yet.<br>They\'ll appear here automatically when you Send to PC.</div>';
            return;
        }
        el.innerHTML = dates.map(d => {
            const dt = new Date(d.date + 'T12:00:00');
            const label = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
            return `<div class="date-item" onclick="loadDay('${d.date}', '${label}')">
                <span class="date-label">${label}</span>
                <span class="date-count">${d.count} note${d.count > 1 ? 's' : ''}</span>
            </div>`;
        }).join('');
    } catch (err) {
        el.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
    }
}

async function loadDay(date, label) {
    document.getElementById('dateListView').style.display = 'none';
    document.getElementById('dayView').style.display = 'block';
    document.getElementById('dayTitle').textContent = label;
    const el = document.getElementById('dayDictations');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading...</div>';

    try {
        const resp = await fetch(`${API}/api/dictations/${room}/date/${date}`);
        const items = await resp.json();
        el.innerHTML = items.map(d => buildCard(d)).join('');
    } catch (err) {
        el.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
    }
}

function backToDates() {
    expandedCardId = null;
    document.getElementById('dateListView').style.display = 'block';
    document.getElementById('dayView').style.display = 'none';
}

// ── Search ──
function setMode(mode) {
    searchMode = mode;
    document.getElementById('exactBtn').classList.toggle('active', mode === 'exact');
    document.getElementById('fuzzyBtn').classList.toggle('active', mode === 'fuzzy');
}

async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q || q.length < 2) return;
    const el = document.getElementById('searchResults');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Searching...</div>';

    try {
        const resp = await fetch(`${API}/api/dictations/${room}/search?q=${encodeURIComponent(q)}&mode=${searchMode}`);
        const items = await resp.json();
        if (!items.length) {
            el.innerHTML = '<div class="empty-state">No matches found. Try fuzzy search?</div>';
            return;
        }
        el.innerHTML = `<div class="result-count">${items.length} result${items.length > 1 ? 's' : ''}</div>`
            + items.map(d => buildCard(d, q)).join('');
    } catch (err) {
        el.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
    }
}

// ── Card builder ──
function buildCard(d, highlightQuery) {
    const time = new Date(d.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const date = new Date(d.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const nameTag = d.patient_name
        ? `<span class="card-patient has-name">${esc(d.patient_name)}</span>`
        : `<span class="card-patient">No name</span>`;
    let preview = esc(d.preview || '');
    if (highlightQuery) preview = highlightText(preview, highlightQuery);

    return `<div class="dictation-card" id="card-${d.id}" onclick="toggleCard(${d.id})">
        <div class="card-header">
            <span class="card-time">${time} · ${date}</span>
            ${nameTag}
        </div>
        <div class="card-preview">${preview}</div>
        <div class="card-full-text" id="fulltext-${d.id}">Loading...</div>
        <div class="card-actions">
            <button onclick="event.stopPropagation(); copyText(${d.id})">📋 Copy</button>
            <button onclick="event.stopPropagation(); editName(${d.id}, '${esc(d.patient_name || '')}')">✏️ Edit Name</button>
            <button class="delete-btn" onclick="event.stopPropagation(); deleteDictation(${d.id})">🗑 Delete</button>
        </div>
        <div id="name-edit-${d.id}"></div>
    </div>`;
}

function highlightText(text, query) {
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
}

async function toggleCard(id) {
    const card = document.getElementById(`card-${id}`);
    if (expandedCardId === id) {
        card.classList.remove('expanded');
        expandedCardId = null;
        return;
    }
    // Collapse previous
    if (expandedCardId) {
        const prev = document.getElementById(`card-${expandedCardId}`);
        if (prev) prev.classList.remove('expanded');
    }
    expandedCardId = id;
    card.classList.add('expanded');

    // Load full text
    const el = document.getElementById(`fulltext-${id}`);
    if (el.dataset.loaded) return;
    try {
        const resp = await fetch(`${API}/api/dictations/${room}/${id}`);
        const data = await resp.json();
        el.textContent = data.text;
        el.dataset.loaded = '1';
    } catch (err) {
        el.textContent = 'Error loading full text.';
    }
}

async function copyText(id) {
    const el = document.getElementById(`fulltext-${id}`);
    let text = el.textContent;
    if (!el.dataset.loaded) {
        const resp = await fetch(`${API}/api/dictations/${room}/${id}`);
        const data = await resp.json();
        text = data.text;
    }
    navigator.clipboard.writeText(text);
    // Brief flash
    const btn = event.target;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = '📋 Copy', 1500);
}

function editName(id, current) {
    const el = document.getElementById(`name-edit-${id}`);
    if (el.innerHTML) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="name-edit-row" onclick="event.stopPropagation()">
        <input type="text" id="name-input-${id}" value="${current}" placeholder="Patient name..." />
        <button onclick="saveName(${id})">Save</button>
    </div>`;
    document.getElementById(`name-input-${id}`).focus();
}

async function saveName(id) {
    const name = document.getElementById(`name-input-${id}`).value.trim();
    await fetch(`${API}/api/dictations/${room}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ patient_name: name })
    });
    document.getElementById(`name-edit-${id}`).innerHTML = '';
    // Refresh current view
    if (currentTab === 'browse') {
        const title = document.getElementById('dayTitle').textContent;
        if (title) {
            // Re-click the day view to refresh
            const dayView = document.getElementById('dayView');
            if (dayView.style.display !== 'none') {
                // Extract date from the active day — just reload
                loadDates();
            }
        }
    } else {
        doSearch();
    }
}

async function deleteDictation(id) {
    if (!confirm('Delete this dictation?')) return;
    await fetch(`${API}/api/dictations/${room}/${id}`, { method: 'DELETE' });
    const card = document.getElementById(`card-${id}`);
    if (card) card.remove();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
