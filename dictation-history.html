<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictation History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0a1628 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 {
            margin: 0;
            font-size: 26px;
            background: linear-gradient(90deg, #4a9eff, #6dd5ed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── Top bar (matches index.html) ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .room-section {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .room-input {
            width: 100px;
            padding: 8px 12px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 8px;
            text-align: center;
            border: none;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #4a9eff;
            outline: none;
        }
        .room-input::placeholder {
            color: rgba(74, 158, 255, 0.4);
            letter-spacing: 4px;
        }
        .btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: linear-gradient(135deg, #4a9eff, #6dd5ed);
            color: white;
        }

        /* ── Status bar (matches index.html) ── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
        }
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #ff4444;
        }
        .status-dot.connected {
            background: #44ff44;
            box-shadow: 0 0 10px #44ff44;
        }

        /* ── Font size picker (matches index.html) ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .font-size-picker {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .font-size-picker label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .font-size-picker select {
            background: rgba(0,0,0,0.3);
            color: #4a9eff;
            border: 1px solid rgba(74,158,255,0.3);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(74,158,255,0.3);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
            border: none;
        }
        .tab.active {
            background: rgba(74,158,255,0.2);
            color: #4a9eff;
        }

        /* ── Search bar ── */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            outline: none;
        }
        .search-bar input:focus { border-color: #4a9eff; }
        .search-toggle {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(74,158,255,0.3);
        }
        .search-toggle button {
            padding: 10px 14px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .search-toggle button.active {
            background: rgba(74,158,255,0.25);
            color: #4a9eff;
        }
        .search-bar .go-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #4a9eff, #357abd);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        /* ── Date list ── */
        .date-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .date-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        .date-item:hover { background: rgba(74,158,255,0.12); border-color: rgba(74,158,255,0.3); }
        .date-label { font-weight: 600; font-size: 15px; }
        .date-count {
            background: rgba(74,158,255,0.2);
            color: #6dd5ed;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ── Back button ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.05);
            color: #4a9eff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
        }
        .back-btn:hover { background: rgba(74,158,255,0.1); }

        /* ── Dictation cards ── */
        .dictation-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.15s;
        }
        .dictation-card:hover { background: rgba(74,158,255,0.1); border-color: rgba(74,158,255,0.3); }
        .dictation-card.expanded { border-color: rgba(74,158,255,0.5); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-time {
            font-size: 13px;
            color: #6dd5ed;
            font-weight: 600;
        }
        .card-patient {
            font-size: 12px;
            background: rgba(74,158,255,0.15);
            color: #8bb8f0;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .card-patient.has-name {
            background: rgba(72, 199, 142, 0.2);
            color: #48c78e;
        }
        .card-preview {
            line-height: 1.5;
            color: rgba(255,255,255,0.7);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-full-text {
            display: none;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .dictation-card.expanded .card-preview { display: none; }
        .dictation-card.expanded .card-full-text { display: block; }

        .card-actions {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            gap: 8px;
        }
        .dictation-card.expanded .card-actions { display: flex; flex-wrap: wrap; }
        .card-actions button {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            cursor: pointer;
        }
        .card-actions button:hover { background: rgba(255,255,255,0.1); }
        .card-actions button.delete-btn { border-color: rgba(255,80,80,0.3); color: #ff6b6b; }
        .card-actions button.delete-btn:hover { background: rgba(255,80,80,0.15); }

        mark {
            background: rgba(255, 214, 0, 0.35);
            color: white;
            border-radius: 2px;
            padding: 0 2px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.4);
        }
        .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-count {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }

        .name-edit-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            align-items: center;
        }
        .name-edit-row input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(74,158,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 13px;
            outline: none;
        }
        .name-edit-row button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background: rgba(74,158,255,0.3);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 600px) {
            .room-input { width: 80px; font-size: 16px; letter-spacing: 4px; padding: 6px 8px; }
            .top-bar { flex-wrap: wrap; gap: 8px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>📋 Dictation History</h1>
        <div class="room-section">
            <input type="text"
                   id="roomCode"
                   class="room-input"
                   placeholder="0000"
                   maxlength="6"
                   pattern="[0-9]*"
                   inputmode="numeric"
                   onkeydown="if(event.key==='Enter')joinRoom()">
            <button class="btn btn-primary" onclick="joinRoom()">Join</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Enter room code</span>
    </div>

    <div id="mainUI" style="display:none;">
        <div class="toolbar">
            <div class="font-size-picker">
                <label>Font Size:</label>
                <select id="fontSizeSelect" onchange="changeFontSize()">
                    <option value="12">12px</option>
                    <option value="14" selected>14px</option>
                    <option value="16">16px</option>
                    <option value="18">18px</option>
                    <option value="20">20px</option>
                    <option value="22">22px</option>
                    <option value="24">24px</option>
                    <option value="28">28px</option>
                </select>
            </div>
            <div style="font-size:12px; color:rgba(255,255,255,0.4);" id="totalCount"></div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabBrowse" onclick="switchTab('browse')">📅 Browse by Date</button>
            <button class="tab" id="tabSearch" onclick="switchTab('search')">🔍 Search All</button>
        </div>

        <div id="browsePanel">
            <div id="dateListView">
                <div id="dateList" class="date-list"></div>
            </div>
            <div id="dayView" style="display:none;">
                <button class="back-btn" onclick="backToDates()">← Back to dates</button>
                <h3 id="dayTitle" style="margin-bottom:14px; font-size:16px; color:rgba(255,255,255,0.8);"></h3>
                <div id="dayDictations"></div>
            </div>
        </div>

        <div id="searchPanel" style="display:none;">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search all dictations..." onkeydown="if(event.key==='Enter')doSearch()" />
                <div class="search-toggle">
                    <button class="active" id="exactBtn" onclick="setMode('exact')">Exact</button>
                    <button id="fuzzyBtn" onclick="setMode('fuzzy')">Fuzzy</button>
                </div>
                <button class="go-btn" onclick="doSearch()">Search</button>
            </div>
            <div id="searchResults"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let room = '';
let searchMode = 'exact';
let currentTab = 'browse';
let expandedCardId = null;
let cardFontSize = localStorage.getItem('dh_fontSize') || '14';

(function() {
    const saved = localStorage.getItem('clipboardSyncRoom');
    if (saved) {
        document.getElementById('roomCode').value = saved;
        setTimeout(() => joinRoom(), 300);
    }
    document.getElementById('fontSizeSelect').value = cardFontSize;
})();

function joinRoom() {
    const input = document.getElementById('roomCode');
    room = input.value.trim();
    if (!room || room.length < 4) {
        showToast('Enter a 4-6 digit room code');
        return;
    }
    localStorage.setItem('clipboardSyncRoom', room);
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected to room: ' + room;
    document.getElementById('mainUI').style.display = 'block';
    switchTab('browse');
}

function changeFontSize() {
    cardFontSize = document.getElementById('fontSizeSelect').value;
    localStorage.setItem('dh_fontSize', cardFontSize);
    document.querySelectorAll('.card-preview, .card-full-text').forEach(el => {
        el.style.fontSize = cardFontSize + 'px';
    });
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabBrowse').classList.toggle('active', tab === 'browse');
    document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
    document.getElementById('browsePanel').style.display = tab === 'browse' ? 'block' : 'none';
    document.getElementById('searchPanel').style.display = tab === 'search' ? 'block' : 'none';
    if (tab === 'browse') loadDates();
    if (tab === 'search') document.getElementById('searchInput').focus();
}

async function loadDates() {
    const el = document.getElementById('dateList');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading dates...</div>';
    document.getElementById('dateListView').style.display = 'block';
    document.getElementById('dayView').style.display = 'none';

    try {
        const resp = await fetch(API + '/api/dictations/' + room + '/dates');
        const dates = await resp.json();
        if (!dates.length) {
            el.innerHTML = '<div class="empty-state">No dictations saved yet.<br>They\'ll appear here automatically when you Send to PC.</div>';
            document.getElementById('totalCount').textContent = '';
            return;
        }
        const total = dates.reduce((s, d) => s + parseInt(d.count), 0);
        document.getElementById('totalCount').textContent = total + ' total dictations';

        el.innerHTML = dates.map(d => {
            // Parse YYYY-MM-DD safely using parts to avoid timezone offset issues
            const p = String(d.date).substring(0, 10).split('-');
            const dt = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
            const label = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
            const dateStr = p.join('-');
            return '<div class="date-item" onclick="loadDay(\'' + dateStr + '\', \'' + label + '\')">'
                + '<span class="date-label">' + label + '</span>'
                + '<span class="date-count">' + d.count + ' note' + (d.count > 1 ? 's' : '') + '</span>'
                + '</div>';
        }).join('');
    } catch (err) {
        el.innerHTML = '<div class="empty-state">Error: ' + err.message + '</div>';
    }
}

async function loadDay(date, label) {
    document.getElementById('dateListView').style.display = 'none';
    document.getElementById('dayView').style.display = 'block';
    document.getElementById('dayTitle').textContent = label;
    document.getElementById('dayView').dataset.date = date;
    const el = document.getElementById('dayDictations');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading...</div>';
    expandedCardId = null;

    try {
        const resp = await fetch(API + '/api/dictations/' + room + '/date/' + date);
        const items = await resp.json();
        if (!items.length) {
            el.innerHTML = '<div class="empty-state">No dictations for this date.</div>';
            return;
        }
        el.innerHTML = items.map(d => buildCard(d)).join('');
    } catch (err) {
        el.innerHTML = '<div class="empty-state">Error: ' + err.message + '</div>';
    }
}

function backToDates() {
    expandedCardId = null;
    document.getElementById('dateListView').style.display = 'block';
    document.getElementById('dayView').style.display = 'none';
}

function setMode(mode) {
    searchMode = mode;
    document.getElementById('exactBtn').classList.toggle('active', mode === 'exact');
    document.getElementById('fuzzyBtn').classList.toggle('active', mode === 'fuzzy');
}

async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q || q.length < 2) { showToast('Type at least 2 characters'); return; }
    const el = document.getElementById('searchResults');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Searching...</div>';
    expandedCardId = null;

    try {
        const resp = await fetch(API + '/api/dictations/' + room + '/search?q=' + encodeURIComponent(q) + '&mode=' + searchMode);
        const items = await resp.json();
        if (items.error) { el.innerHTML = '<div class="empty-state">' + esc(items.error) + '</div>'; return; }
        if (!items.length) {
            el.innerHTML = '<div class="empty-state">No matches for "' + esc(q) + '"'
                + (searchMode === 'exact' ? '<br><br>Try switching to Fuzzy mode' : '') + '</div>';
            return;
        }
        el.innerHTML = '<div class="result-count">' + items.length + ' result' + (items.length > 1 ? 's' : '')
            + ' for "' + esc(q) + '" (' + searchMode + ')</div>'
            + items.map(d => buildCard(d, q)).join('');
    } catch (err) {
        el.innerHTML = '<div class="empty-state">Error: ' + err.message + '</div>';
    }
}

function buildCard(d, highlightQuery) {
    var dt = new Date(d.created_at);
    var time = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    var date = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    var nameTag = d.patient_name
        ? '<span class="card-patient has-name">' + esc(d.patient_name) + '</span>'
        : '<span class="card-patient">No name</span>';
    var preview = esc(d.preview || '');
    if (highlightQuery) preview = highlightText(preview, highlightQuery);
    var fs = cardFontSize;
    var safeName = esc(d.patient_name || '').replace(/'/g, "\\'");

    return '<div class="dictation-card" id="card-' + d.id + '" onclick="toggleCard(' + d.id + ')">'
        + '<div class="card-header">'
        + '<span class="card-time">' + time + ' &middot; ' + date + '</span>'
        + nameTag
        + '</div>'
        + '<div class="card-preview" style="font-size:' + fs + 'px">' + preview + '</div>'
        + '<div class="card-full-text" style="font-size:' + fs + 'px" id="fulltext-' + d.id + '">Loading...</div>'
        + '<div class="card-actions">'
        + '<button onclick="event.stopPropagation(); copyText(' + d.id + ')">📋 Copy</button>'
        + '<button onclick="event.stopPropagation(); editName(' + d.id + ', \'' + safeName + '\')">✏️ Edit Name</button>'
        + '<button class="delete-btn" onclick="event.stopPropagation(); deleteDictation(' + d.id + ')">🗑 Delete</button>'
        + '</div>'
        + '<div id="name-edit-' + d.id + '"></div>'
        + '</div>';
}

function highlightText(text, query) {
    var regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<mark>$1</mark>');
}

async function toggleCard(id) {
    var card = document.getElementById('card-' + id);
    if (expandedCardId === id) {
        card.classList.remove('expanded');
        expandedCardId = null;
        return;
    }
    if (expandedCardId) {
        var prev = document.getElementById('card-' + expandedCardId);
        if (prev) prev.classList.remove('expanded');
    }
    expandedCardId = id;
    card.classList.add('expanded');

    var el = document.getElementById('fulltext-' + id);
    if (el.dataset.loaded) return;
    try {
        var resp = await fetch(API + '/api/dictations/' + room + '/' + id);
        var data = await resp.json();
        el.textContent = data.text;
        el.dataset.loaded = '1';
    } catch (err) {
        el.textContent = 'Error loading full text.';
    }
}

async function copyText(id) {
    var el = document.getElementById('fulltext-' + id);
    var text = el.textContent;
    if (!el.dataset.loaded) {
        var resp = await fetch(API + '/api/dictations/' + room + '/' + id);
        var data = await resp.json();
        text = data.text;
    }
    try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard!');
    } catch (e) {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied!');
    }
}

function editName(id, current) {
    var el = document.getElementById('name-edit-' + id);
    if (el.innerHTML) { el.innerHTML = ''; return; }
    el.innerHTML = '<div class="name-edit-row" onclick="event.stopPropagation()">'
        + '<input type="text" id="name-input-' + id + '" value="' + current + '" placeholder="Patient name..." onkeydown="if(event.key===\'Enter\')saveName(' + id + ')" />'
        + '<button onclick="saveName(' + id + ')">Save</button>'
        + '</div>';
    setTimeout(function() { document.getElementById('name-input-' + id).focus(); }, 50);
}

async function saveName(id) {
    var name = document.getElementById('name-input-' + id).value.trim();
    try {
        await fetch(API + '/api/dictations/' + room + '/' + id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patient_name: name })
        });
        showToast(name ? 'Tagged: ' + name : 'Name cleared');
        // Refresh current view
        if (currentTab === 'search') {
            doSearch();
        } else {
            var savedDate = document.getElementById('dayView').dataset.date;
            if (savedDate && document.getElementById('dayView').style.display !== 'none') {
                var label = document.getElementById('dayTitle').textContent;
                loadDay(savedDate, label);
            }
        }
    } catch (err) {
        showToast('Error saving name');
    }
}

async function deleteDictation(id) {
    if (!confirm('Delete this dictation permanently?')) return;
    try {
        await fetch(API + '/api/dictations/' + room + '/' + id, { method: 'DELETE' });
        var card = document.getElementById('card-' + id);
        if (card) {
            card.style.opacity = '0';
            card.style.transform = 'translateX(50px)';
            card.style.transition = 'all 0.3s';
            setTimeout(function() { card.remove(); }, 300);
        }
        showToast('Deleted');
    } catch (err) {
        showToast('Error deleting');
    }
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
